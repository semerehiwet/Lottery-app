<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ናይና online ዕፃ</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker Registered'))
            .catch(err => console.log('Service Worker Failed', err));
        });
      }
    </script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .app-container {
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px rgba(168, 85, 247, 0.15);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 30px 25px;
        }
        .brand-header {
            text-align: center;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .app-logo {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #ec4899, #8b5cf6, #3b82f6);
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }
        .brand-header h1 {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 0.5px;
            background: linear-gradient(to right, #f59e0b, #ec4899, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 12px rgba(0,0,0,0.1);
        }
        .brand-header p {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 2px;
        }
        .info-box {
            background: linear-gradient(90deg, rgba(245, 158, 11, 0.1), rgba(236, 72, 153, 0.05));
            border-left: 4px solid #f59e0b;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 25px;
            color: #e2e8f0;
            font-size: 14px;
            line-height: 1.6;
        }
        .form-group {
            margin-bottom: 22px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-size: 14px;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #475569;
            background-color: rgba(15, 23, 42, 0.6);
            border-radius: 12px;
            font-size: 16px;
            color: #ffffff;
            outline: none;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            border-color: #ec4899;
            box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.2);
        }
        .result-box {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.8) 0%, rgba(30, 41, 59, 0.8) 100%);
            border: 2px dashed #475569;
            border-radius: 16px;
            padding: 18px;
            text-align: center;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }
        .result-title {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 6px;
        }
        .result-count {
            color: #f59e0b;
            font-size: 34px;
            font-weight: 800;
            text-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
        }
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 50%, #3b82f6 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
        }
        .submit-btn:hover {
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.5);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="brand-header">
            <div class="app-logo">✨</div>
            <h1>ናይና online ዕፃ</h1>
            <p>የባለዕድልነቱን ጉዞ ዛሬውኑ በኦንላይን ይጀምሩ</p>
        </div>

        <div class="info-box">
            💡 <strong>ማስታወሻ፦</strong> የአንድ ዕጣ (ትኬት) ዋጋ <strong>2500 ብር</strong> ነው። የሚገዙትን የዕጣ ብዛት ሲያስገቡ ጠቅላላ ክፍያው በራሱ ይባዛል።
        </div>

        <form id="lotteryForm">
            <div class="form-group">
                <label for="fullName">ሙሉ ስም</label>
                <input type="text" id="fullName" placeholder="እባክዎን ስምዎን ያስገቡ" required>
            </div>

            <div class="form-group">
                <label for="phoneNumber">ስልክ ቁጥር</label>
                <input type="tel" id="phoneNumber" placeholder="09........" required>
            </div>

            <div class="form-group">
                <label for="ticketCount">የሚገዙት የዕጣ (ትኬት) ብዛት</label>
                <input type="number" id="ticketInput" min="1" value="1" placeholder="የዕጣ ብዛት ያስገቡ" required>
            </div>

            <div class="result-box" id="resBox">
                <div class="result-title">ጠቅላላ የሚከፈለው ገንዘብ፦</div>
                <div class="result-count" id="totalAmountDisplay">2,500 ብር</div>
            </div>

            <button type="submit" class="submit-btn">ክፍያ ፈጽም (በ Chapa)</button>
        </form>
    </div>

    <script>
        const ticketInput = document.getElementById('ticketInput');
        const totalAmountDisplay = document.getElementById('totalAmountDisplay');
        const form = document.getElementById('lotteryForm');
        const resBox = document.getElementById('resBox');

        const TICKET_PRICE = 2500;

        // ተጠቃሚው ቁጥር በጻፈ ቁጥር ብሩን በ 2500 እያባዛ የሚያሳይ
        ticketInput.addEventListener('input', (e) => {
            let count = parseInt(e.target.value) || 0;
            if (count < 1) count = 1; // ከ 1 በታች እንዳይሆን መከላከያ
            
            const total = count * TICKET_PRICE;
            totalAmountDisplay.textContent = `${total.toLocaleString()} ብር`;
            
            resBox.style.borderColor = '#ec4899';
            setTimeout(() => resBox.style.borderColor = '#475569', 300);
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const phoneNumber = document.getElementById('phoneNumber').value;
            const ticketCount = parseInt(ticketInput.value) || 1;
            const finalAmount = ticketCount * TICKET_PRICE; // ጠቅላላ የሚላከው ብር

            try {
                // *** እዚህ ጋር የራስህን የ RENDER ሰርቨር ሊንክ ማስገባትህን እርግጠኛ ሁን ***
                const response = await fetch('https://የአንተ-ሰርቨር-ስም.onrender.com/api/pay', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, phoneNumber, amount: finalAmount })
                });

                const data = await response.json();
                
                if (data.checkout_url) {
                    window.location.href = data.checkout_url;
                } else {
                    alert('ስህተት፦ Chapa ክፍያውን መጀመር አልቻለም');
                }
            } catch (error) {
                console.error(error);
                alert('ከሰርቨር ጋር መገናኘት አልተቻለም');
            }
        });
    </script>
</body>
</html>
